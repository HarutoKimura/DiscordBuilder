# Split-context adversarial review on every non-draft, same-repository PR, run
# by the official OpenAI Codex GitHub Action. Fork PRs are excluded so repository
# secrets are never exposed to untrusted code. The Codex job receives repository
# read permission and the API key; a separate keyless job posts its final report
# to the PR.
#
# Required repository secret:
#   gh secret set OPENAI_API_KEY
name: Codex Adversarial Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: codex-adversarial-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{
        !github.event.pull_request.draft &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      reviewed_head_sha: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Run Codex adversarial review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.6-sol
          effort: high
          prompt-file: .github/codex/prompts/adversarial-review.md
          codex-args: '["--ephemeral"]'
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: codex-review.md

  post_review:
    runs-on: ubuntu-latest
    needs: review
    if: ${{ needs.review.outputs.final_message != '' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Codex review to the pull request
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
          CODEX_REVIEWED_HEAD_SHA: ${{ needs.review.outputs.reviewed_head_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-adversarial-review -->';
            const issueNumber = context.payload.pull_request.number;
            const reviewedHeadSha = process.env.CODEX_REVIEWED_HEAD_SHA;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber,
            });

            if (pullRequest.head.sha !== reviewedHeadSha) {
              core.notice(
                `Skipping stale Codex review for ${reviewedHeadSha}; current head is ${pullRequest.head.sha}.`,
              );
              return;
            }

            const body = [
              marker,
              '## Codex adversarial review',
              '',
              `Reviewed head: \`${reviewedHeadSha}\``,
              '',
              process.env.CODEX_FINAL_MESSAGE,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existingComment = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }
